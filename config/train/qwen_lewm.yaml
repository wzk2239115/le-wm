defaults:
  - _self_
  - data: pusht

output_model_name: qwen_lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
patch_size: 14
encoder_scale: tiny
dump_object: True

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0
  accumulate_grad_batches: 4  # 增加，因为 Qwen 占用显存

loader:
  batch_size: 32  # 减小 batch size（原来 128）
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 3e-5  # 稍微降低学习率
  weight_decay: 1e-3

wandb:
  enabled: False
  config:
    entity: lewm
    project: qwen-lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

swanlab:
  enabled: True
  config:
    project: qwen-lewm
    experiment_name: ${output_model_name}

wm:
  type: qwen_lewm
  history_size: 3
  num_preds: 1
  embed_dim: 192
  frameskip: 5
  action_dim: 2  # PushT 的动作维度

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

  # 新增语言条件损失权重
  lang_cond:
    weight: 0.1  # 语言条件的正则化权重

qwen:
  model_path: "Qwen/Qwen2.5-3B-Instruct"
  freeze: true  # 冻结 Qwen
